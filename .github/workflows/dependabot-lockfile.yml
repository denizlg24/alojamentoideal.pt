name: Dependabot lockfile

# Dependabot has no native Bun support: it updates package.json manifests but
# leaves bun.lock stale, which breaks CI's `bun install --frozen-lockfile`.
# This job regenerates bun.lock on Dependabot PRs and pushes it back.

on:
  pull_request:

permissions:
  contents: write

jobs:
  fix-lockfile:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - name: Regenerate bun.lock
        run: bun install --lockfile-only

      - name: Commit and push if changed
        run: |
          if [ -z "$(git status --porcelain bun.lock)" ]; then
            echo "bun.lock already up to date"
            exit 0
          fi
          git config user.name "dependabot[bot]"
          git config user.email "49699333+dependabot[bot]@users.noreply.github.com"
          git add bun.lock
          git commit -m "chore: regenerate bun.lock for dependabot update"
          git push
