openapi: 3.0.1
info:
  title: Bokun API
  description: You can sign up for the <a href="https://bokun.activehosted.com/f/17">Bokun
    API mailing list</a> to receive notifications when there are upcoming changes
    to this API. <br/>Further documentation of this api is available here
    <a href="https://bokun.dev/booking-api-restful/vU6sCfxwYdJWd1QAcLt12i" target="_blank">Bokun
    REST API documentation</a>. <br/> You can generate a client in your preferred
    language using <a href="http://editor.swagger.io/#/?import=https://bokun.github.io/api-docs/bokun.yaml">swagger
    editor</a>
  version: "1.0"
servers:
  - url: https://api.bokun.io
  - url: https://api.bokuntest.com
tags:
  - name: activity
    description: Operations for Experiences, Tours & Activities
  - name: booking
    description: Operations for Bookings
  - name: cart
    description: Operations for Shopping carts
  - name: shopping-cart
    description: Operations for Shopping carts
  - name: checkout
    description: Operations for Checkout
  - name: question
    description: Operations for Booking questions and answers
  - name: product-list
    description: Operations for Product Lists
  - name: category
    description: Operations for Categories
  - name: country
    description: Operations for countries and nationalities
  - name: currency
    description: Operations for Supported Currencies
  - name: language
    description: Operations for Supported Languages
  - name: tag
    description: Operations for Tags
  - name: route
    description: Operations for Transport routes
  - name: accommodation
    description: Operations for Accommodation
paths:
  /accommodation.json/search:
    post:
      tags:
        - accommodation
      summary: Search accommodations and availability
      operationId: accommodationSearch
      parameters:
        - name: currency
          in: query
          description: The currency code to use for calculating prices.
          schema:
            type: string
            default: ISK
        - name: lang
          in: query
          description: The language the content should be served in
          schema:
            type: string
            default: EN
      requestBody:
        content:
          '*/*':
            schema:
              $ref: '#/components/schemas/AccommodationQuery'
        required: true
      responses:
        "200":
          description: No response was specified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResultsDto'
      x-codegen-request-body-name: body
  /accommodation.json/check-room-availability:
    post:
      tags:
        - accommodation
      summary: Get a list of all rooms available for a given stay interval.
      operationId: checkRoomAvailability
      requestBody:
        content:
          '*/*':
            schema:
              $ref: '#/components/schemas/RoomAvailabilityRequestDto'
        required: true
      responses:
        "200":
          description: No response was specified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomAvailabilityResponseDto'
      x-codegen-request-body-name: body
  /accommodation.json/{id}/check-availability:
    post:
      tags:
        - accommodation
      summary: Check availability for a selected Accommodation
      operationId: checkAccommodationAvailability
      parameters:
        - name: id
          in: path
          description: ID of the Accommodation
          required: true
          schema:
            type: integer
            format: int64
        - name: currency
          in: query
          description: The currency code to use for calculating prices.
          schema:
            type: string
            default: ISK
        - name: lang
          in: query
          description: The language the content should be served in
          schema:
            type: string
            default: EN
      requestBody:
        content:
          '*/*':
            schema:
              $ref: '#/components/schemas/AccommodationQuery'
        required: true
      responses:
        "200":
          description: No response was specified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccommodationAvailabilityReportDto'
      x-codegen-request-body-name: body
  /accommodation.json/{id}:
    get:
      tags:
        - accommodation
      summary: Get Accommodation by ID
      operationId: getAccommodation
      parameters:
        - name: id
          in: path
          description: ID of accommodation to be fetched
          required: true
          schema:
            type: integer
            format: int64
        - name: lang
          in: query
          description: The language the content should be served in
          schema:
            type: string
            default: EN
      responses:
        "200":
          description: No response was specified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccommodationDto'
  /accommodation.json/{id}/rooms:
    get:
      tags:
        - accommodation
      summary: Get a list of all rooms for a particular Accommodation.
      operationId: getRoomsByRoomType
      parameters:
        - name: id
          in: path
          description: ID of the accommodation
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: No response was specified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomsGroupedByTypeContainer'
  /accommodation.json/availabilities:
    get:
      tags:
        - accommodation
      summary: Get room availabilities for one or more accommodations over an interval
      operationId: getAccommodationAvailabilities
      parameters:
        - name: ids
          in: query
          description: Comma separated IDs of the Accommodations
          required: true
          schema:
            type: string
        - name: start
          in: query
          description: The start date of the interval (yyyy-MM-dd)
          required: true
          schema:
            type: string
        - name: end
          in: query
          description: The end date of the interval (yyyy-MM-dd)
          required: true
          schema:
            type: string
        - name: lang
          in: query
          description: The language the content should be served in
          schema:
            type: string
            default: EN
        - name: currency
          in: query
          description: The currency code to use for calculating prices.
          schema:
            type: string
            default: ISK
      responses:
        "200":
          description: Activity availability response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccommodationAvailabilitiesDto'
  /accommodation.json/slug/{slug}:
    get:
      tags:
        - accommodation
      summary: Look up Accommodation by slug
      operationId: findAccommodationBySlug
      parameters:
        - name: slug
          in: path
          description: The slug of the accommodation to be fetched
          required: true
          schema:
            type: string
        - name: lang
          in: query
          description: The language the content should be served in
          schema:
            type: string
            default: EN
      responses:
        "200":
          description: No response was specified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccommodationDto'
  /currency.json/findAll:
    get:
      tags:
        - currency
      summary: Get all Supported Currencies
      description: "Get a list of all the available currencies, along with conversion\
        \ rates to ISK."
      operationId: allCurrencies
      responses:
        "200":
          description: No response was specified
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CurrencyDto'
  /tag.json/groups:
    get:
      tags:
        - tag
      summary: Get the tag groups
      operationId: getTagGroups
      parameters:
        - name: flags
          in: query
          description: Comma separated list of required flags
          schema:
            type: string
        - name: lang
          in: query
          description: The language the content should be served in
          schema:
            type: string
            default: EN
      responses:
        "200":
          description: No response was specified
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TagGroupDto'
  /category.json/{productType}:
    get:
      tags:
        - category
      summary: Get all categories for the specified product type
      operationId: categoriesByProductType
      parameters:
        - name: productType
          in: path
          description: The product type to be categorized
          required: true
          schema:
            type: string
        - name: item
          in: query
          description: Specifies whether to get only categories for bookable items in
            this product type or not
          schema:
            type: string
        - name: flags
          in: query
          description: Comma separated list of required flags
          schema:
            type: string
        - name: lang
          in: query
          description: The language the content should be served in
          schema:
            type: string
            default: EN
      responses:
        "200":
          description: No response was specified
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CategoryDto'
  /activity.json/{id}/upcoming-availabilities/{max}:
    get:
      tags:
        - activity
      summary: Get the next upcoming Activity availabilities
      description: "Get the list of upcoming availabilities for the activity id (including\
        \ sold-outs, if parameter \"includeSoldOut\" == true.)"
      operationId: getUpcomingAvailabilities
      parameters:
        - name: id
          in: path
          description: ID of activity to be fetched
          required: true
          schema:
            type: integer
            format: int64
        - name: max
          in: path
          description: The max number of upcoming availabilities to get.
          required: true
          schema:
            type: integer
            format: int32
        - name: lang
          in: query
          description: The language the content should be served in
          schema:
            type: string
            default: EN
        - name: includeSoldOut
          in: query
          description: Specify whether to include availabilities that are sold out.
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: No response was specified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivityAvailabilityDto'
  /activity.json/slug/{slug}:
    get:
      tags:
        - activity
      summary: Look up Activity by slug
      description: Use corresponding slug (human readable string that is used to identify
        the product) for fetching this product. Slug is set in Product overview ->
        Actions -> Slugs.
      operationId: findActivityBySlug
      parameters:
        - name: slug
          in: path
          description: The slug of the activity to be fetched
          required: true
          schema:
            type: string
        - name: lang
          in: query
          description: The language the content should be served in
          schema:
            type: string
            default: EN
      responses:
        "200":
          description: No response was specified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivityDto'
  /activity.json/{id}/pickup-places:
    get:
      tags:
        - activity
      summary: Get Pickup / Dropoff places for an Activity
      operationId: getPickupPlaces
      parameters:
        - name: id
          in: path
          description: ID of the Activity
          required: true
          schema:
            type: integer
            format: int64
        - name: currency
          in: query
          description: The currency code to use for calculating prices.
          schema:
            type: string
            default: ISK
        - name: lang
          in: query
          description: The language the content should be served in
          schema:
            type: string
            default: EN
      responses:
        "200":
          description: No response was specified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivityPlacesDto'
  /activity.json/search:
    post:
      tags:
        - activity
      summary: Search activities and availability
      operationId: activitySearch
      parameters:
        - name: currency
          in: query
          description: The currency code to use for calculating prices.
          schema:
            type: string
            default: ISK
        - name: lang
          in: query
          description: The language the content should be served in
          schema:
            type: string
            default: EN
      requestBody:
        description: JSON object
        content:
          '*/*':
            schema:
              $ref: '#/components/schemas/ActivityQuery'
        required: true
      responses:
        "200":
          description: No response was specified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResultsDto'
      x-codegen-request-body-name: body
  /activity.json/{id}/availabilities:
    get:
      tags:
        - activity
      summary: Get Activity availabilities for an interval
      operationId: getActivityAvailabilities
      parameters:
        - name: id
          in: path
          description: ID of activity to be fetched
          required: true
          schema:
            type: integer
            format: int64
        - name: start
          in: query
          description: The start date of the interval ('yyyy-MM-dd')
          required: true
          schema:
            type: string
        - name: end
          in: query
          description: The end date of the interval ('yyyy-MM-dd')
          required: true
          schema:
            type: string
        - name: lang
          in: query
          description: The language the content should be served in
          schema:
            type: string
            default: EN
        - name: currency
          in: query
          description: The currency code to use for calculating prices.
          schema:
            type: string
            default: ISK
        - name: includeSoldOut
          in: query
          description: Specify whether to include availabilities that are sold out.
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: No response was specified
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ActivityAvailabilityDto'
  /activity.json/active-ids:
    get:
      tags:
        - activity
      summary: Get IDs of all active Activities that can be booked
      operationId: getActivityIds
      responses:
        "200":
          description: No response was specified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SellableActivities'
  /activity.json/list-updated:
    get:
      tags:
        - activity
      summary: Get ids/timestamps of all Activities modified in specified date range
      operationId: getUpdatedActivities
      parameters:
        - name: fromDate
          in: query
          description: "date range start inclusive (ISO yyyy-MM-ddTHH:mm:ss.SSS - time\
          \ can be ommitted or partial, time zone UTC)"
          required: true
          schema:
            type: string
        - name: toDate
          in: query
          description: "date range end exclusive (ISO yyyy-MM-ddTHH:mm:ss.SSS - time\
          \ can be ommitted or partial, time zone UTC)"
          schema:
            type: string
      responses:
        "200":
          description: No response was specified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdatedProductsResponse'
  /activity.json/list-by-id:
    get:
      tags:
        - activity
      summary: Get a list of Activities matching the IDs provided
      operationId: activityListByIds
      parameters:
        - name: ids
          in: query
          description: Comma separated list of Activity IDs
          required: true
          schema:
            type: string
        - name: currency
          in: query
          description: The currency code to use for calculating prices.
          schema:
            type: string
            default: ISK
        - name: lang
          in: query
          description: The language the content should be served in
          schema:
            type: string
            default: EN
      responses:
        "200":
          description: No response was specified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResultsDto'
  /activity.json/{id}/price-list:
    get:
      tags:
        - activity
      summary: Get Activity price list
      operationId: priceList
      parameters:
        - name: id
          in: path
          description: ID of activity for which we want prices
          required: true
          schema:
            type: integer
            format: int64
        - name: currency
          in: query
          description: The currency code in which we want the prices.
          schema:
            type: string
      responses:
        "200":
          description: No response was specified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivityPriceListDto'
  /activity.json/{id}:
    get:
      tags:
        - activity
      summary: Get Activity by ID
      description: Use unique ID for fetching comprehensive information on this activity
        product.
      operationId: getActivity
      parameters:
        - name: id
          in: path
          description: ID of activity to be fetched
          required: true
          schema:
            type: integer
            format: int64
        - name: currency
          in: query
          description: The currency code to use for calculating prices.
          schema:
            type: string
            default: ISK
        - name: lang
          in: query
          description: The language the content should be served in
          schema:
            type: string
            default: EN
      responses:
        "200":
          description: No response was specified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivityDto'
  /shopping-cart.json/session/{sessionId}:
    get:
      tags:
        - shopping-cart
      summary: Get a session shopping cart
      operationId: getSessionCart
      parameters:
        - name: sessionId
          in: path
          description: The session ID of shopping cart to be fetched
          required: true
          schema:
            type: string
        - name: currency
          in: query
          description: The currency code to use for calculating prices.
          schema:
            type: string
            default: ISK
        - name: lang
          in: query
          description: The language the content should be served in
          schema:
            type: string
            default: EN
      responses:
        "200":
          description: No response was specified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShoppingCart'
  /shopping-cart.json/session/{sessionId}/route:
    post:
      tags:
        - shopping-cart
      summary: Add route booking to a session cart
      operationId: addRouteToSessionCart
      parameters:
        - name: sessionId
          in: path
          description: The session ID of shopping cart
          required: true
          schema:
            type: string
        - name: trackingCode
          in: query
          description: Affiliate tracking code.
          schema:
            type: string
        - name: vesselId
          in: query
          description: ID of the vessel associated with this booking.
          schema:
            type: integer
            format: int64
        - name: harbourId
          in: query
          description: ID of the harbour associated with this booking.
          schema:
            type: integer
            format: int64
        - name: currency
          in: query
          description: The currency code to use for calculating prices.
          schema:
            type: string
            default: ISK
        - name: lang
          in: query
          description: The language the content should be served in
          schema:
            type: string
            default: EN
      requestBody:
        description: "JSON object describing the route booking request, can be array\
          \ of such objects"
        content:
          '*/*':
            schema:
              $ref: '#/components/schemas/TransportBookingRequestDto'
        required: true
      responses:
        "200":
          description: No response was specified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShoppingCart'
      x-codegen-request-body-name: body
  /shopping-cart.json/session/{sessionId}/remove-room/{roomBookingId}:
    get:
      tags:
        - shopping-cart
      summary: Remove a room booking from a session cart
      operationId: removeRoomFromSessionCart
      parameters:
        - name: sessionId
          in: path
          description: The session ID of shopping cart
          required: true
          schema:
            type: string
        - name: roomBookingId
          in: path
          description: The ID of the room booking to remove
          required: true
          schema:
            type: integer
            format: int64
        - name: currency
          in: query
          description: The currency code to use for calculating prices.
          schema:
            type: string
            default: ISK
        - name: lang
          in: query
          description: The language the content should be served in
          schema:
            type: string
            default: EN
      responses:
        "200":
          description: No response was specified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShoppingCart'
  /shopping-cart.json/session/{sessionId}/remove-extra/{bType}/{bId}/{eId}:
    get:
      tags:
        - shopping-cart
      summary: Remove an extra booking from an existing parent booking in a session
        cart
      operationId: removeExtraBookingFromSessionCart
      parameters:
        - name: sessionId
          in: path
          description: The session ID of shopping cart
          required: true
          schema:
            type: string
        - name: bType
          in: path
          description: The booking type
          required: true
          schema:
            type: string
        - name: bId
          in: path
          description: The ID of the parent booking of this type
          required: true
          schema:
            type: integer
            format: int64
        - name: eId
          in: path
          description: The ID of the extra to be removed (NOT the extra booking)
          required: true
          schema:
            type: integer
            format: int64
        - name: currency
          in: query
          description: The currency code to use for calculating prices.
          schema:
            type: string
            default: ISK
        - name: lang
          in: query
          description: The language the content should be served in
          schema:
            type: string
            default: EN
      responses:
        "200":
          description: No response was specified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShoppingCart'
  /shopping-cart.json/session/{sessionId}/accommodation:
    post:
      tags:
        - shopping-cart
      summary: Add accommodation booking to a session cart
      operationId: addAccommodationToSessionCart
      parameters:
        - name: sessionId
          in: path
          description: The session ID of shopping cart
          required: true
          schema:
            type: string
        - name: trackingCode
          in: query
          description: Affiliate tracking code.
          schema:
            type: string
        - name: vesselId
          in: query
          description: ID of the vessel associated with this booking.
          schema:
            type: integer
            format: int64
        - name: harbourId
          in: query
          description: ID of the harbour associated with this booking.
          schema:
            type: integer
            format: int64
        - name: currency
          in: query
          description: The currency code to use for calculating prices.
          schema:
            type: string
            default: ISK
        - name: lang
          in: query
          description: The language the content should be served in
          schema:
            type: string
            default: EN
      requestBody:
        description: "JSON object describing the accommodation booking request, can\
          \ be array of such objects"
        content:
          '*/*':
            schema:
              $ref: '#/components/schemas/AccommodationBookingRequestDto'
        required: true
      responses:
        "200":
          description: No response was specified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShoppingCart'
      x-codegen-request-body-name: body
  /shopping-cart.json/session/{sessionId}/activity:
    post:
      tags:
        - shopping-cart
      summary: Add activity booking to a session cart
      operationId: addActivityToSessionCart
      parameters:
        - name: sessionId
          in: path
          description: The session ID of shopping cart
          required: true
          schema:
            type: string
        - name: trackingCode
          in: query
          description: Affiliate tracking code.
          schema:
            type: string
        - name: vesselId
          in: query
          description: ID of the vessel associated with this booking.
          schema:
            type: integer
            format: int64
        - name: harbourId
          in: query
          description: ID of the harbour associated with this booking.
          schema:
            type: integer
            format: int64
        - name: currency
          in: query
          description: The currency code to use for calculating prices.
          schema:
            type: string
            default: ISK
        - name: lang
          in: query
          description: The language the content should be served in
          schema:
            type: string
            default: EN
      requestBody:
        description: "JSON object describing the activity booking request, can be\
          \ array of such objects"
        content:
          '*/*':
            schema:
              $ref: '#/components/schemas/ActivityBookingRequestDto'
        required: true
      responses:
        "200":
          description: No response was specified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShoppingCart'
      x-codegen-request-body-name: body
  /shopping-cart.json/session/{sessionId}/remove-accommodation/{accommodationBookingId}:
    get:
      tags:
        - shopping-cart
      summary: Remove an accommodation booking from a session cart
      operationId: removeAccommodationFromSessionCart
      parameters:
        - name: sessionId
          in: path
          description: The session ID of shopping cart
          required: true
          schema:
            type: string
        - name: accommodationBookingId
          in: path
          description: The ID of the accommodation booking to remove
          required: true
          schema:
            type: integer
            format: int64
        - name: currency
          in: query
          description: The currency code to use for calculating prices.
          schema:
            type: string
            default: ISK
        - name: lang
          in: query
          description: The language the content should be served in
          schema:
            type: string
            default: EN
      responses:
        "200":
          description: No response was specified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShoppingCart'
  /shopping-cart.json/session/{sessionId}/remove-activity/{activityBookingId}:
    get:
      tags:
        - shopping-cart
      summary: Remove an activity booking from a session cart
      operationId: removeActivityFromSessionCart
      parameters:
        - name: sessionId
