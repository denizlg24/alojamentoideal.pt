            - **Country Code (e.g., `jp`)**: Accepts a two-letter country code (ISO 3166-1) to specify a language based on a specific country. For example, `jp` represents **Japanese** (ISO 639-1 code for the language) as spoken in **Japan** (ISO 3166-1 country code).
            - **Language Code (e.g., `es`)**: Accepts a two-letter language code (ISO 639-1) to specify a language without a country. For example, `es` represents **Spanish**.
            - **Language and Country Code (e.g., `es_419`)**: Accepts both the language code (ISO 639-1) and a region-specific country code (ISO 3166-1), separated by an underscore. For example, `es_419` represents **Latin American Spanish** (where `es` is the language code, and `419` is the region code for Latin America).
            
            Case does not matter for the `lang` parameter. It can be provided in either uppercase or lowercase letters, and it will be interpreted correctly.
