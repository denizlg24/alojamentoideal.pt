services:
  postgres:
    image: postgres:17-alpine
    container_name: alojamentoideal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: alojamentoideal
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d alojamentoideal"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
